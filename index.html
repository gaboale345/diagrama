<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diagrama de Casos de Uso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Sistema de gestión de lavado de vehículos</p>
          <h1>Diagrama de Casos de Uso</h1>
          <p>
            Visualiza los principales actores y funcionalidades del sistema de forma interactiva.
          </p>
        </div>
        <div class="hero-badge">Dinámico · Interactivo · Elegante</div>
      </header>

      <section class="toolbar">
        <div class="filter-group" id="viewButtons"></div>
        <div class="legend">
          <span><i class="dot actor"></i> Actor</span>
          <span><i class="dot case"></i> Caso de uso</span>
        </div>
      </section>

      <main class="content-grid">
        <section class="diagram-card">
          <div class="card-title">Vista seleccionada</div>
          <div id="diagram" class="diagram-render"></div>
        </section>

        <aside class="info-card">
          <div class="card-title">Resumen</div>
          <div id="summaryContent"></div>
        </aside>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
